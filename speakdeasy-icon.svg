<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Deep purple background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0f3a"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <!-- Purple glow gradient for speech bubble -->
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="60%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <!-- Amber/gold gradient for sound waves -->
    <linearGradient id="waveGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#f7b733"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <!-- White shimmer on bubble -->
    <linearGradient id="shimmer" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#6c63ff" flood-opacity="0.45"/>
    </filter>
    <!-- Glow filter for waves -->
    <filter id="waveGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#f7b733" flood-opacity="0.7"/>
    </filter>
    <!-- Clip to rounded square -->
    <clipPath id="roundedSquare">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle radial glow in centre -->
  <radialGradient id="centreGlow" cx="50%" cy="48%" r="52%">
    <stop offset="0%" stop-color="#6c63ff" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#centreGlow)"/>

  <!-- ── Main speech bubble ── -->
  <g filter="url(#shadow)">
    <!-- Bubble body: rounded rectangle -->
    <rect x="84" y="88" width="310" height="230" rx="44" ry="44" fill="url(#bubbleGrad)"/>
    <!-- Shimmer overlay -->
    <rect x="84" y="88" width="310" height="230" rx="44" ry="44" fill="url(#shimmer)"/>
    <!-- Bubble tail pointing down-left -->
    <path d="M 148 316 L 124 380 L 200 316 Z" fill="url(#bubbleGrad)"/>
    <!-- Inner highlight border (top-left arc) -->
    <path d="M 128 160 Q 84 88 168 88" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="3"/>
  </g>

  <!-- ── Sound wave bars inside bubble ── -->
  <!-- Five bars of different heights, centred in the bubble -->
  <g filter="url(#waveGlow)">
    <!-- Bar 1 (shortest left) -->
    <rect x="148" y="172" width="28" height="70" rx="14" fill="url(#waveGrad)"/>
    <!-- Bar 2 (medium) -->
    <rect x="196" y="148" width="28" height="118" rx="14" fill="url(#waveGrad)"/>
    <!-- Bar 3 (tallest centre) -->
    <rect x="244" y="128" width="28" height="138" rx="14" fill="white"/>
    <!-- Bar 4 (medium) -->
    <rect x="292" y="148" width="28" height="118" rx="14" fill="url(#waveGrad)"/>
    <!-- Bar 5 (shortest right) -->
    <rect x="340" y="172" width="28" height="70" rx="14" fill="url(#waveGrad)"/>
  </g>

  <!-- ── "SD" text subtle watermark inside bubble (optional, very faint) ── -->

  <!-- ── Bottom wordmark ── -->
  <!-- "SpeakDeasy" text — rendered as path-style text for crisp rendering -->
  <text
    x="256" y="456"
    text-anchor="middle"
    font-family="'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif"
    font-size="56"
    font-weight="900"
    letter-spacing="-1"
    fill="white"
    opacity="0.92">SpeakDeasy</text>

  <!-- Subtle bottom glow under text -->
  <ellipse cx="256" cy="472" rx="160" ry="10" fill="#6c63ff" opacity="0.2"/>
</svg>
