<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>SpeakDeasy AAC</title>
<script>
// Unregister any old Service Workers
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{regs.forEach(r=>r.unregister());});
}
// Emergency escape: visit the URL with ?reset=1 to clear all cached state
// e.g. https://your-username.github.io/speakdeasy/?reset=1
if(location.search.indexOf('reset=1') >= 0){
  try{sessionStorage.clear();}catch(e){}
  try{
    ['sd_cache_v5','sd_cv5','sd_cache_v4','sd_cv','sd_app_cache_v3','sd_cache_ver'].forEach(k=>localStorage.removeItem(k));
  }catch(e){}
  if('caches' in window) caches.keys().then(ks=>ks.forEach(k=>caches.delete(k)));
  // Redirect to clean URL without the reset parameter
  location.replace(location.pathname);
}
(function(){
  try{
    var html=sessionStorage.getItem('sd_unlocked_html');
    // Validate the payload looks like real HTML before writing it.
    // If it's corrupt/truncated/wrong, clear it and show the password screen.
    var valid = html &&
                html.length > 10000 &&
                html.indexOf('<!DOCTYPE') >= 0 &&
                html.indexOf('SpeakDeasy') >= 0 &&
                html.indexOf('</html>') >= 0;
    if(valid){
      // Clear sessionStorage BEFORE document.open so the loop can't restart
      sessionStorage.removeItem('sd_unlocked_html');
      var st=document.createElement('style');
      st.textContent='*{visibility:hidden!important}';
      document.head.appendChild(st);
      document.open('text/html','replace');
      document.write(html);
      document.close();
    } else if(html){
      // Stale or corrupt — clear it so the password screen shows cleanly
      sessionStorage.removeItem('sd_unlocked_html');
    }
  }catch(e){
    try{sessionStorage.removeItem('sd_unlocked_html');}catch(e2){}
  }
})();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0f1117;font-family:system-ui,-apple-system,sans-serif;color:#f0f2ff}
#unlockScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100svh;padding:32px 24px;gap:18px;text-align:center}
.logo{font-size:56px;line-height:1}
h1{font-size:24px;font-weight:900;letter-spacing:-.5px}
.sub{font-size:13px;color:#9097b8;font-weight:600;max-width:280px;line-height:1.6}
.pw-field{width:100%;max-width:320px;padding:16px 18px;background:#1a1d27;border:2px solid #2a2d3e;border-radius:16px;color:#f0f2ff;font-size:18px;font-weight:700;text-align:center;outline:none;letter-spacing:2px;transition:border-color .2s;font-family:inherit}
.pw-field:focus{border-color:#6c63ff}
.pw-field::placeholder{color:#444760;letter-spacing:0;font-size:14px}
.unlock-btn{width:100%;max-width:320px;padding:16px;background:linear-gradient(135deg,#6c63ff,#4e46e8);border:none;border-radius:16px;color:white;font-size:17px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px rgba(108,99,255,.4);transition:all .18s}
.unlock-btn:active{transform:scale(.96)}
.unlock-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.err{color:#ff6584;font-size:13px;font-weight:700;min-height:20px}
.prog-wrap{width:100%;max-width:320px;height:4px;background:#1a1d27;border-radius:2px;overflow:hidden;display:none}
.prog-bar{height:100%;background:#6c63ff;border-radius:2px;animation:sweep 1s ease infinite alternate;width:50%}
@keyframes sweep{from{margin-left:-50%}to{margin-left:100%}}
.foot{font-size:11px;color:#2a2d3e;max-width:300px;line-height:1.5;margin-top:8px}
.offline-badge{background:#22263a;border:1px solid #2a2d3e;border-radius:20px;padding:6px 14px;font-size:11px;font-weight:700;color:#9097b8;display:none;align-items:center;gap:6px}
.offline-badge.show{display:flex}
.green-dot{width:8px;height:8px;border-radius:50%;background:#43e97b;flex-shrink:0}
</style>

  <div class="offline-badge" id="offlineBadge"><div class="green-dot"></div>Saved on this device &mdash; works offline</div>

    autocomplete="current-password" autocorrect="off" spellcheck="false"

const CACHE_KEY='sd_cache_v5',CACHE_VER='sd_cv5',APP_VER='33206';
var IS_STANDALONE=window.navigator.standalone===true||window.matchMedia('(display-mode:standalone)').matches;
function b64ToBytes(b){const n=atob(b),u=new Uint8Array(n.length);for(let i=0;i<n.length;i++)u[i]=n.charCodeAt(i);return u;}
function bytesToB64(u){let s='';for(let i=0;i<u.length;i+=8192)s+=String.fromCharCode(...u.subarray(i,i+8192));return btoa(s);}
async function dKey(){const r=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(navigator.userAgent+screen.width+'sd5'));return crypto.subtle.importKey('raw',r,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
async function encL(p,k){const v=crypto.getRandomValues(new Uint8Array(12)),c=await crypto.subtle.encrypt({name:'AES-GCM',iv:v},k,new TextEncoder().encode(p));return bytesToB64(v)+'.'+bytesToB64(new Uint8Array(c));}
async function decL(s,k){const[a,b]=s.split('.');return new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM',iv:b64ToBytes(a)},k,b64ToBytes(b)));}
function launchApp(html){
  // Validate payload before attempting launch
  if(!html || html.length < 10000 || html.indexOf('SpeakDeasy') < 0){
    showErr('Decryption error — please try again');
    return;
  }
  try{
    sessionStorage.setItem('sd_unlocked_html', html);
    // Verify it was actually stored (some browsers block sessionStorage)
    var stored = sessionStorage.getItem('sd_unlocked_html');
    if(stored && stored.length > 10000){
      document.body.style.cssText='visibility:hidden;opacity:0';
      window.location.reload();
    } else {
      // sessionStorage failed — write directly without reload
      sessionStorage.removeItem('sd_unlocked_html');
      document.open('text/html','replace');
      document.write(html);
      document.close();
    }
  }catch(e){
    // sessionStorage not available — write directly
    try{sessionStorage.removeItem('sd_unlocked_html');}catch(e2){}
    document.open('text/html','replace');
    document.write(html);
    document.close();
  }
}
async function checkCache(){
  try{
    const c=localStorage.getItem(CACHE_KEY),v=localStorage.getItem(CACHE_VER);
    if(!c||v!==String(APP_VER))return;
    const html=await decL(c,await dKey());
    if(!html||html.length<1000)return;
    document.getElementById('offlineBadge').classList.add('show');
    const b=document.getElementById('unlockBtn');
    b.textContent='Loading…';b.disabled=true;
    document.getElementById('progWrap').style.display='block';
    setTimeout(()=>launchApp(html),IS_STANDALONE?150:700);
  }catch(e){localStorage.removeItem(CACHE_KEY);localStorage.removeItem(CACHE_VER);}
}
async function doUnlock(){
  const pw=document.getElementById('pwInput').value.trim();
  if(!pw){showErr('Enter the password');return;}
  const b=document.getElementById('unlockBtn'),p=document.getElementById('progWrap');
  b.disabled=true;b.textContent='Decrypting…';p.style.display='block';showErr('');
  try{
    const bk=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64ToBytes(SALT_B64),iterations:250000,hash:'SHA-256'},bk,{name:'AES-GCM',length:256},false,['decrypt']);
    const html=new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM',iv:b64ToBytes(IV_B64)},k,b64ToBytes(CT_B64)));
    try{const dk=await dKey();localStorage.setItem(CACHE_KEY,await encL(html,dk));localStorage.setItem(CACHE_VER,String(APP_VER));}catch(e){}
    launchApp(html);
  }catch(e){
    b.disabled=false;b.textContent='Open SpeakDeasy';p.style.display='none';
    showErr('Incorrect password — try again');
    document.getElementById('pwInput').value='';document.getElementById('pwInput').focus();
  }
}
function showErr(m){document.getElementById('errMsg').textContent=m;}
window.addEventListener('DOMContentLoaded',()=>{
  // Clear ALL old cache keys from previous versions that may contain
  // broken payloads (blob SW code, const IS_STANDALONE)
  ['sd_app_cache_v3','sd_cache_ver','sd_cache_v4','sd_cv','sd_cache_v5','sd_cv5'].forEach(k=>{
    try{localStorage.removeItem(k);}catch(e){}
  });
  // Also clear any cached SW registrations stored in caches API
  if('caches' in window){
    caches.keys().then(ks=>ks.forEach(k=>caches.delete(k)));
  }
  checkCache();
  document.getElementById('pwInput').focus();
});
</script>
