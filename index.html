const CK='sd_enc_v2',CV='sd_enc_ver2',AV='58057';
var SA=window.navigator.standalone===true||window.matchMedia('(display-mode:standalone)').matches;
if('serviceWorker' in navigator)
  navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister()));
if(location.search.indexOf('reset=1')>=0){try{localStorage.clear();}catch(e){}location.replace(location.pathname);}
function b2b(b){const n=atob(b),u=new Uint8Array(n.length);for(let i=0;i<n.length;i++)u[i]=n.charCodeAt(i);return u;}
function b64(u){let s='';for(let i=0;i<u.length;i+=8192)s+=String.fromCharCode(...u.subarray(i,i+8192));return btoa(s);}
async function dk(){const r=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(navigator.userAgent+screen.width+'sde2'));return crypto.subtle.importKey('raw',r,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
async function saveCache(html){try{const k=await dk(),iv=crypto.getRandomValues(new Uint8Array(12)),c=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,new TextEncoder().encode(html));localStorage.setItem(CK,b64(iv)+'.'+b64(new Uint8Array(c)));localStorage.setItem(CV,AV);}catch(e){}}
async function loadCache(){const st=localStorage.getItem(CK),ver=localStorage.getItem(CV);if(!st||ver!==AV)return null;try{const[a,b_]=st.split('.');return new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM',iv:b2b(a)},await dk(),b2b(b_)));}catch(e){localStorage.removeItem(CK);return null;}}
function launch(html){document.getElementById('fr').style.display='block';document.getElementById('us').style.display='none';document.getElementById('fr').srcdoc=html;}
async function go(){
  const pw=document.getElementById('pw').value.trim();
  if(!pw){showErr('Enter the password');return;}
  const btn=document.getElementById('btn'),prg=document.getElementById('prg');
  btn.disabled=true;btn.textContent='Decrypting…';prg.style.display='block';showErr('');
  try{
    const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2b(SALT_B64),iterations:250000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
    const html=new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM',iv:b2b(IV_B64)},key,b2b(CT_B64)));
    await saveCache(html);launch(html);
  }catch(e){
    btn.disabled=false;btn.textContent='Open SpeakDeasy';prg.style.display='none';
    showErr('Incorrect password — please try again');
    document.getElementById('pw').value='';document.getElementById('pw').focus();
  }
}
async function checkCache(){
  const html=await loadCache();if(!html)return;
  document.getElementById('badge').classList.add('show');
  const btn=document.getElementById('btn');btn.textContent='Opening…';btn.disabled=true;
  document.getElementById('prg').style.display='block';
  setTimeout(()=>launch(html),SA?150:600);
}
function showErr(m){document.getElementById('err').textContent=m;}
window.addEventListener('DOMContentLoaded',()=>{checkCache();document.getElementById('pw').focus();});
</script>
