<script>
(function(){
  try{
    const html=sessionStorage.getItem('sd_unlocked_html');
    if(html&&html.length>1000){
      // Hide the page immediately so the unlock screen never flashes
      // This runs before <style> or <body> are parsed — before anything is visible
      const s=document.createElement('style');
      s.textContent='*{visibility:hidden!important;opacity:0!important}';
      document.head.appendChild(s);
      // Small rAF delay lets the hide style paint before we write the new doc
      // On fast browsers document.open fires before next frame anyway
      document.open('text/html','replace');
      document.write(html);
      document.close();
    }
  }catch(e){}
})();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0f1117;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:#f0f2ff}
#unlockScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100svh;padding:32px 24px;gap:18px;text-align:center}
.logo{font-size:56px;line-height:1;margin-bottom:4px}
h1{font-size:24px;font-weight:900;letter-spacing:-.5px}
.sub{font-size:13px;color:#9097b8;font-weight:600;max-width:280px;line-height:1.6}
.pw-field{width:100%;max-width:320px;padding:16px 18px;background:#1a1d27;border:2px solid #2a2d3e;border-radius:16px;color:#f0f2ff;font-size:18px;font-weight:700;text-align:center;outline:none;letter-spacing:2px;transition:border-color .2s;font-family:inherit}
.pw-field:focus{border-color:#6c63ff}
.pw-field::placeholder{color:#444760;letter-spacing:0;font-size:14px}
.unlock-btn{width:100%;max-width:320px;padding:16px;background:linear-gradient(135deg,#6c63ff,#4e46e8);border:none;border-radius:16px;color:white;font-size:17px;font-weight:900;cursor:pointer;transition:all .18s;font-family:inherit;box-shadow:0 4px 20px rgba(108,99,255,.4)}
.unlock-btn:active{transform:scale(.96)}
.unlock-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.err{color:#ff6584;font-size:13px;font-weight:700;min-height:20px}
.prog-wrap{width:100%;max-width:320px;height:4px;background:#1a1d27;border-radius:2px;overflow:hidden;display:none}
.prog-bar{height:100%;background:#6c63ff;border-radius:2px;animation:sweep 1s ease infinite alternate;width:50%}
@keyframes sweep{from{margin-left:-50%}to{margin-left:100%}}
.foot{font-size:11px;color:#2a2d3e;max-width:300px;line-height:1.5;margin-top:8px}
.offline-badge{background:#22263a;border:1px solid #2a2d3e;border-radius:20px;padding:6px 14px;font-size:11px;font-weight:700;color:#9097b8;display:none;align-items:center;gap:6px}
.offline-badge.show{display:flex}
.green-dot{width:8px;height:8px;border-radius:50%;background:#43e97b;flex-shrink:0}
</style>

const CACHE_KEY='sd_app_cache_v3',CACHE_VER='sd_cache_ver',APP_VER='3061';
const IS_STANDALONE=window.navigator.standalone===true||window.matchMedia('(display-mode:standalone)').matches;

function b64ToBytes(b64){const bin=atob(b64),out=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)out[i]=bin.charCodeAt(i);return out;}
function bytesToB64(bytes){let bin='';for(let i=0;i<bytes.length;i+=8192)bin+=String.fromCharCode(...bytes.subarray(i,i+8192));return btoa(bin);}
async function deviceKey(){const seed=navigator.userAgent+screen.width+screen.colorDepth+'sd_v3';const raw=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(seed));return crypto.subtle.importKey('raw',raw,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
async function encryptLocal(plain,key){const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(plain));return bytesToB64(iv)+'.'+bytesToB64(new Uint8Array(ct));}
async function decryptLocal(stored,key){const[ivB64,ctB64]=stored.split('.');const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64ToBytes(ivB64)},key,b64ToBytes(ctB64));return new TextDecoder().decode(plain);}

function launchApp(html){
  try{
    sessionStorage.setItem('sd_unlocked_html',html);
    // Hide everything immediately so the unlock screen doesn't show during reload
    document.body.style.cssText='visibility:hidden;opacity:0;transition:none';
    window.location.reload();
  }
  catch(e){document.open('text/html','replace');document.write(html);document.close();}
}

async function checkCache(){
  try{
    const cached=localStorage.getItem(CACHE_KEY),ver=localStorage.getItem(CACHE_VER);
    if(!cached||ver!==String(APP_VER))return;
    const key=await deviceKey(),html=await decryptLocal(cached,key);
    if(html&&html.length>1000){
      document.getElementById('offlineBadge').classList.add('show');
      const btn=document.getElementById('unlockBtn');
      btn.textContent='Loading…';btn.disabled=true;
      document.getElementById('progWrap').style.display='block';
      setTimeout(()=>launchApp(html),IS_STANDALONE?150:600);
    }
  }catch(e){localStorage.removeItem(CACHE_KEY);localStorage.removeItem(CACHE_VER);}
}

async function doUnlock(){
  const pw=document.getElementById('pwInput').value.trim();
  if(!pw){showErr('Please enter the password');return;}
  const btn=document.getElementById('unlockBtn'),prog=document.getElementById('progWrap');
  btn.disabled=true;btn.textContent='Decrypting…';prog.style.display='block';showErr('');
  try{
    const pwBytes=new TextEncoder().encode(pw);
    const baseKey=await crypto.subtle.importKey('raw',pwBytes,'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64ToBytes(SALT_B64),iterations:250000,hash:'SHA-256'},baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
    const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64ToBytes(IV_B64)},key,b64ToBytes(CT_B64));
    const html=new TextDecoder().decode(plain);
    try{const dKey=await deviceKey();const stored=await encryptLocal(html,dKey);localStorage.setItem(CACHE_KEY,stored);localStorage.setItem(CACHE_VER,String(APP_VER));}catch(e){}
    launchApp(html);
  }catch(e){
    btn.disabled=false;btn.textContent='Open SpeakDeasy';prog.style.display='none';
    showErr('Incorrect password — please try again');
    document.getElementById('pwInput').value='';document.getElementById('pwInput').focus();
  }
}
function showErr(msg){document.getElementById('errMsg').textContent=msg;}
window.addEventListener('DOMContentLoaded',()=>{checkCache();document.getElementById('pwInput').focus();});
</script>
