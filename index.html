<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SpeakDeasy">
<meta name="theme-color" content="#0f1117">
<title>SpeakDeasy AAC</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden;background:#0f1117;font-family:system-ui,-apple-system,sans-serif;color:#f0f2ff}
#unlockScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:32px 24px;gap:18px;text-align:center}
.logo{font-size:56px;line-height:1}
h1{font-size:24px;font-weight:900;letter-spacing:-.5px}
.sub{font-size:13px;color:#9097b8;font-weight:600;max-width:280px;line-height:1.6}
.pw-field{width:100%;max-width:320px;padding:16px 18px;background:#1a1d27;border:2px solid #2a2d3e;border-radius:16px;color:#f0f2ff;font-size:18px;font-weight:700;text-align:center;outline:none;letter-spacing:2px;transition:border-color .2s;font-family:inherit}
.pw-field:focus{border-color:#6c63ff}
.pw-field::placeholder{color:#444760;letter-spacing:0;font-size:14px}
.unlock-btn{width:100%;max-width:320px;padding:16px;background:linear-gradient(135deg,#6c63ff,#4e46e8);border:none;border-radius:16px;color:white;font-size:17px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px rgba(108,99,255,.4);transition:all .18s}
.unlock-btn:active{transform:scale(.96)}
.unlock-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.err{color:#ff6584;font-size:13px;font-weight:700;min-height:20px}
.prog-wrap{width:100%;max-width:320px;height:4px;background:#1a1d27;border-radius:2px;overflow:hidden;display:none}
.prog-bar{height:100%;background:#6c63ff;border-radius:2px;animation:sweep 1s ease infinite alternate;width:50%}
@keyframes sweep{from{margin-left:-50%}to{margin-left:100%}}
.foot{font-size:11px;color:#2a2d3e;max-width:300px;line-height:1.5;margin-top:8px}
.offline-badge{background:#22263a;border:1px solid #2a2d3e;border-radius:20px;padding:6px 14px;font-size:11px;font-weight:700;color:#9097b8;display:none;align-items:center;gap:6px}
.offline-badge.show{display:flex}
.green-dot{width:8px;height:8px;border-radius:50%;background:#43e97b;flex-shrink:0}
#appFrame{display:none;position:fixed;inset:0;width:100%;height:100%;border:none;background:#0f1117}
</style>
</head>
<body>

<div id="unlockScreen">
  <div class="logo">&#x1F5E3;&#xFE0F;</div>
  <h1>SpeakDeasy AAC</h1>
  <p class="sub">Enter your password to open the app</p>
  <div class="offline-badge" id="offlineBadge">
    <div class="green-dot"></div>Saved on this device &mdash; works offline
  </div>
  <input class="pw-field" type="password" id="pwInput"
    placeholder="Enter password" autocomplete="current-password"
    autocorrect="off" spellcheck="false"
    onkeydown="if(event.key==='Enter')doUnlock()">
  <div class="prog-wrap" id="progWrap"><div class="prog-bar"></div></div>
  <button class="unlock-btn" id="unlockBtn" onclick="doUnlock()">Open SpeakDeasy</button>
  <div class="err" id="errMsg"></div>
  <p class="foot">Protected with AES-256 encryption &bull; Data stays on this device only</p>
</div>

<iframe id="appFrame"
  allow="microphone;camera;autoplay;fullscreen;display-capture"
  sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-downloads allow-pointer-lock">
</iframe>

const CACHE_KEY='sd_v6',CACHE_VER='sd_ver6',APP_VER='30739';

// Unregister any old Service Workers from previous versions
if('serviceWorker' in navigator)
  navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister()));

// Clear old Cache API entries
if('caches' in window)
  caches.keys().then(ks=>ks.forEach(k=>caches.delete(k)));

// Emergency reset: visit URL?reset=1 to clear everything and start fresh
if(location.search.indexOf('reset=1')>=0){
  try{localStorage.clear();}catch(e){}
  location.replace(location.pathname);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function b64ToBytes(b){
  const n=atob(b),u=new Uint8Array(n.length);
  for(let i=0;i<n.length;i++)u[i]=n.charCodeAt(i);
  return u;
}
function bytesToB64(u){
  let s='';
  for(let i=0;i<u.length;i+=8192)s+=String.fromCharCode(...u.subarray(i,i+8192));
  return btoa(s);
}
async function deviceKey(){
  const raw=await crypto.subtle.digest('SHA-256',
    new TextEncoder().encode(navigator.userAgent+screen.width+'sdv6'));
  return crypto.subtle.importKey('raw',raw,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function saveCache(html){
  try{
    const k=await deviceKey();
    const iv=crypto.getRandomValues(new Uint8Array(12));
    const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,new TextEncoder().encode(html));
    localStorage.setItem(CACHE_KEY,bytesToB64(iv)+'.'+bytesToB64(new Uint8Array(ct)));
    localStorage.setItem(CACHE_VER,String(APP_VER));
  }catch(e){console.log('Cache save:',e);}
}
async function loadCache(){
  const stored=localStorage.getItem(CACHE_KEY);
  const ver=localStorage.getItem(CACHE_VER);
  if(!stored||ver!==String(APP_VER))return null;
  try{
    const[ivB64,ctB64]=stored.split('.');
    const plain=await crypto.subtle.decrypt(
      {name:'AES-GCM',iv:b64ToBytes(ivB64)},await deviceKey(),b64ToBytes(ctB64));
    return new TextDecoder().decode(plain);
  }catch(e){
    localStorage.removeItem(CACHE_KEY);localStorage.removeItem(CACHE_VER);
    return null;
  }
}

// ── Launch into iframe ────────────────────────────────────────────────────────
function launchApp(html){
  const frame=document.getElementById('appFrame');
  const screen=document.getElementById('unlockScreen');
  frame.style.display='block';
  screen.style.display='none';
  frame.srcdoc=html;
}

// ── Decrypt and launch ────────────────────────────────────────────────────────
async function doUnlock(){
  const pw=document.getElementById('pwInput').value.trim();
  if(!pw){showErr('Enter the password');return;}
  const btn=document.getElementById('unlockBtn'),prog=document.getElementById('progWrap');
  btn.disabled=true;btn.textContent='Decrypting…';prog.style.display='block';showErr('');
  try{
    const baseKey=await crypto.subtle.importKey(
      'raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey(
      {name:'PBKDF2',salt:b64ToBytes(SALT_B64),iterations:250000,hash:'SHA-256'},
      baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
    const plain=await crypto.subtle.decrypt(
      {name:'AES-GCM',iv:b64ToBytes(IV_B64)},key,b64ToBytes(CT_B64));
    const html=new TextDecoder().decode(plain);
    saveCache(html);
    launchApp(html);
  }catch(e){
    btn.disabled=false;btn.textContent='Open SpeakDeasy';prog.style.display='none';
    showErr('Incorrect password — please try again');
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
}

// ── Load from offline cache ───────────────────────────────────────────────────
async function checkCache(){
  const html=await loadCache();
  if(!html)return;
  document.getElementById('offlineBadge').classList.add('show');
  const btn=document.getElementById('unlockBtn');
  btn.textContent='Loading…';btn.disabled=true;
  document.getElementById('progWrap').style.display='block';
  const standalone=window.navigator.standalone===true||
    window.matchMedia('(display-mode:standalone)').matches;
  setTimeout(()=>launchApp(html),standalone?200:800);
}

function showErr(m){document.getElementById('errMsg').textContent=m;}

window.addEventListener('DOMContentLoaded',()=>{
  checkCache();
  document.getElementById('pwInput').focus();
});
</script>
